name: Gitleaks self-scan

on:
  push:
    branches: [develop, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  gitleaks:
    uses: ./.github/workflows/gitleaks.yml
    with:
      fail_on_finding: false
      config_path: .gitleaks.toml
